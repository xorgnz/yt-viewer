services:
  postgres:
    image: postgres:16-alpine
    container_name: yt-viewer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: yt_viewer
      POSTGRES_USER: yt_viewer
      POSTGRES_PASSWORD: yt_viewer_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yt_viewer -d yt_viewer"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  postgres-data:
