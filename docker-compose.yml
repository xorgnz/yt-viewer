services:
  mysql:
    image: mariadb:10.6
    container_name: yt-viewer-mysql
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: yt_viewer
      MARIADB_USER: yt_viewer
      MARIADB_PASSWORD: yt_viewer_dev
      MARIADB_ROOT_PASSWORD: yt_viewer_root_dev
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u yt_viewer --password=$$MARIADB_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  mysql-data:
